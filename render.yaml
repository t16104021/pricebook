services:
  - type: web
    name: pricebook
    runtime: python
    buildCommand: "true"
    startCommand: python3 server.py
    envVars:
      - key: PRICEBOOK_DB_PATH
        value: /opt/render/project/src/data/pricebook.sqlite3
      - key: PRICEBOOK_PASSWORD
        sync: false
      - key: PRICEBOOK_SESSION_SECRET
        generateValue: true
    disk:
      name: pricebook-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
