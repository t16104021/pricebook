<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="860" viewBox="0 0 1440 860" role="img" aria-labelledby="title desc">
  <title id="title">Pricebook 產品價格管理系統示意畫面</title>
  <desc id="desc">以測試資料呈現產品清單、客戶售價與價格時間軸的後台畫面。</desc>
  <rect width="1440" height="860" fill="#f6f7f9"/>
  <rect x="36" y="32" width="1368" height="796" rx="18" fill="#ffffff" stroke="#dce3df"/>
  <g font-family="Inter, Noto Sans TC, Arial, sans-serif">
    <text x="82" y="92" font-size="30" font-weight="700" fill="#1c2522">產品售價管理</text>
    <text x="82" y="124" font-size="16" fill="#68756f">追蹤產品定價、客戶售價與每一次價格異動</text>
    <rect x="1052" y="68" width="98" height="42" rx="8" fill="#eef3f1"/>
    <text x="1074" y="95" font-size="15" font-weight="700" fill="#1c2522">AI 設定</text>
    <rect x="1164" y="68" width="154" height="42" rx="8" fill="#116a5b"/>
    <text x="1204" y="95" font-size="15" font-weight="700" fill="#ffffff">新增產品</text>

    <rect x="82" y="158" width="1276" height="54" rx="8" fill="#ffffff" stroke="#dce3df"/>
    <text x="104" y="192" font-size="17" font-weight="700" fill="#0b4f44">⌘K</text>
    <text x="150" y="192" font-size="16" fill="#68756f">搜尋產品、SKU 或客戶名稱</text>
    <rect x="1160" y="170" width="82" height="30" rx="15" fill="#dceee9"/>
    <text x="1179" y="190" font-size="13" font-weight="700" fill="#0b4f44">近期異動</text>

    <g>
      <rect x="82" y="236" width="224" height="92" rx="10" fill="#eef3f1"/>
      <text x="104" y="269" font-size="14" fill="#68756f">產品數</text>
      <text x="104" y="307" font-size="31" font-weight="700" fill="#1c2522">24</text>
      <rect x="322" y="236" width="224" height="92" rx="10" fill="#eef3f1"/>
      <text x="344" y="269" font-size="14" fill="#68756f">客戶數</text>
      <text x="344" y="307" font-size="31" font-weight="700" fill="#1c2522">18</text>
      <rect x="562" y="236" width="224" height="92" rx="10" fill="#eef3f1"/>
      <text x="584" y="269" font-size="14" fill="#68756f">售價筆數</text>
      <text x="584" y="307" font-size="31" font-weight="700" fill="#1c2522">76</text>
      <rect x="802" y="236" width="556" height="92" rx="10" fill="#eef3f1"/>
      <text x="824" y="269" font-size="14" fill="#68756f">最近更新</text>
      <text x="824" y="307" font-size="22" font-weight="700" fill="#1c2522">2026-07-15</text>
    </g>

    <rect x="82" y="352" width="346" height="422" rx="10" fill="#ffffff" stroke="#dce3df"/>
    <text x="106" y="390" font-size="19" font-weight="700" fill="#1c2522">產品名單</text>
    <text x="356" y="390" font-size="14" fill="#68756f">3 筆</text>
    <line x1="106" y1="410" x2="404" y2="410" stroke="#dce3df"/>
    <rect x="104" y="430" width="302" height="76" rx="8" fill="#dceee9"/>
    <text x="122" y="460" font-size="13" font-weight="700" fill="#0b4f44">PB-001</text>
    <text x="122" y="488" font-size="18" font-weight="700" fill="#1c2522">示範產品 A</text>
    <text x="122" y="533" font-size="13" fill="#68756f">PB-002　示範產品 B</text>
    <text x="122" y="580" font-size="13" fill="#68756f">PB-003　示範產品 C</text>
    <rect x="104" y="622" width="302" height="112" rx="8" fill="#f6f7f9"/>
    <text x="122" y="653" font-size="13" font-weight="700" fill="#68756f">示意資料</text>
    <text x="122" y="684" font-size="14" fill="#68756f">所有名稱與金額均為測試內容</text>
    <text x="122" y="710" font-size="14" fill="#68756f">不含實際客戶或報價資料</text>

    <rect x="450" y="352" width="908" height="422" rx="10" fill="#ffffff" stroke="#dce3df"/>
    <text x="480" y="390" font-size="14" font-weight="700" fill="#0b4f44">PB-001</text>
    <text x="480" y="425" font-size="28" font-weight="700" fill="#1c2522">示範產品 A</text>
    <text x="480" y="454" font-size="14" fill="#68756f">測試分類 · 以去識別化資料展示</text>
    <rect x="480" y="480" width="240" height="78" rx="8" fill="#eef3f1"/>
    <text x="500" y="509" font-size="13" fill="#68756f">目前產品定價</text>
    <text x="500" y="540" font-size="24" font-weight="700" fill="#1c2522">$ 1,200</text>
    <rect x="740" y="480" width="240" height="78" rx="8" fill="#eef3f1"/>
    <text x="760" y="509" font-size="13" fill="#68756f">客戶售價範圍</text>
    <text x="760" y="540" font-size="24" font-weight="700" fill="#1c2522">$ 980–1,080</text>
    <text x="480" y="610" font-size="19" font-weight="700" fill="#1c2522">客戶售價</text>
    <rect x="480" y="632" width="838" height="42" rx="5" fill="#eef3f1"/>
    <text x="500" y="659" font-size="13" font-weight="700" fill="#68756f">客戶</text>
    <text x="776" y="659" font-size="13" font-weight="700" fill="#68756f">目前售價</text>
    <text x="1036" y="659" font-size="13" font-weight="700" fill="#68756f">生效日</text>
    <line x1="480" y1="704" x2="1318" y2="704" stroke="#dce3df"/>
    <text x="500" y="732" font-size="14" fill="#1c2522">測試客戶甲</text>
    <text x="776" y="732" font-size="14" fill="#1c2522">$ 1,050</text>
    <text x="1036" y="732" font-size="14" fill="#1c2522">2026-07-01</text>
  </g>
</svg>
